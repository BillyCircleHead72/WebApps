    <!DOCTYPE html>
    <html>
        <head>
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Task Tracker WebApp</title>

            <style>
                ol {
                    margin-top: 200px;
                }
                .title {

                    margin-left: 100px;
                }
                .time {
                    position: absolute;
                    margin-top: 0px;
                    margin-left: 50px;
                    font-size: 40px;
                }
                .texts { 
                    position: absolute;
                    margin-top: -0px;
                    margin-left: 190px;
                    font-size: 40;
                    position: fixed;
                    line-height: 0.75;
                    text-align: center;

                }
                html, body {
                    margin: 0;
                    padding: 0;
                    height: 100%;
                }
                body {
                    font-family: cursive;
                    margin: 0;
                    background-image: url("task tracker background.png");
                    background-color: #e0a048;
                    background-size: cover;
                    background-position: center; 
                    background-repeat: no-repeat;
                    background-attachment: fixed;
                    min-height: 100vh;
                    min-height: 100dvh;
                    overflow-x: hidden;
                }
                .content {
                    position: absolute;
                    top: 15%;
                    left: 50%;
                    transform: translate(-50%, 35%);
                    text-align: center;
                    width: 100%;
                }

                button {
                    margin-top: 5px;
                    font-size: 15px;
                    font-family: cursive;
                    text-align: center;
                    background-color: #e8d3b5;
                    border: 2.5px solid #705532;
                    outline: #705532;
                }
                input {
                    margin-top: 5px;
                    font-size: 15px;
                    font-family: cursive;
                    text-align: center;
                    background-color: #e8d3b5;
                    border: 2.5px solid #705532;
                    outline: #705532;
                }
                input[type="checkbox"] {
                    accent-color: #e0a048;
                    width: 20px;
                    height: 20px;
                }
                li {
                    margin-left: 0px;
                    display: flex;
                    align-items: center;
        
                }
                li span {
                    flex: 1;
                    text-align: center;
                    max-width: 200px;
                }
                .credits {
                    text-align: center;
                    position: absolute;
                    left: 35%;
                    top: 70%;
                }
            </style>
        </head>

        <body>
            
            <h1 class="title">~Task Tracker~</h1>
            <h2 id="time" class="time">0:00</h2>
            <h2 id="timesUp" class="texts" style="display: none;">Time is Up!!<br>
                <span style="font-size: 10px;">Please Reset the Timer..</span></h2>
            
            <h2 id="minus" class="texts" style="display: none;">Invalid Input<br>
                <span style="font-size: 10px;">Please enter a valid number..</span></h2>
                
            <div class="content">
            <input type="number" id="minutesInput" placeholder="Input Minutes Here :D">
            <button onclick="startTimer()">Start</button>
            <button onclick="pauseTimer()">Pause</button>
            <button onclick="resetTimer()">Reset</button>
            <br>
            <input type="text" id="taskInput" placeholder="Enter Task...">
            <button  onclick="addTask()">Add Task</button>
            </div>

            <ol id="taskList"></ol>

            <p class="credits"><span style="font-weight: 500;">by: Orang yang <span style="font-weight: 1000;">masih</span><br> menginginkanmu</span></p>



        </body>

        <script>
            const max_tasks = 10
            let tasks = [];
            //Tasks code
            function addTask() {
                let agenda = document.getElementById("taskInput").value;

                if (tasks.length > max_tasks-1) {
                    return;
                }
                if (agenda === "") {
                    return;
                }

                tasks.push({
                    name: agenda,
                    done: false
                });

                document.getElementById("taskInput").value = "";

                displayTasks();
            }

            function displayTasks() {
                let list = document.getElementById("taskList");

                list.innerHTML = "";
                for (let i = 0; i < tasks.length; i++) {
                    //list
                    let li = document.createElement("li");

                    //checkbox
                    let checkbox = document.createElement("input");
                    checkbox.type = "checkbox";
                    checkbox.checked = tasks[i].done;
                    checkbox.onclick = function () {
                        tasks[i].done = !tasks[i].done;
                        displayTasks();
                    };

                    //name of task
                    let span = document.createElement("span");
                    span.textContent = tasks[i].name;

                    //delete button
                    let deleteButton = document.createElement("button");
                    deleteButton.textContent = "Delete";
                    deleteButton.onclick = function () {
                        tasks.splice(i,1); //remove task from array
                        displayTasks();
                    };
                    if (tasks[i].done) {
                        span.style.textDecoration= "line-through";
                    }

                    li.appendChild(checkbox);
                    li.appendChild(span);
                    li.appendChild(deleteButton);
                    list.appendChild(li);
                }
            }
            


            //Timer code
            let time = 0;
            let timer = null;

            function timerDisplay() {
                let minutes = Math.floor(time / 60);
                let seconds = time % 60;

                if (seconds < 10) {
                    seconds = "0" + seconds;
                }
                document.getElementById("time").textContent =
                minutes + ":" + seconds;
            }

            function startTimer() {
                if (timer !== null) {
                    return;
                }
                
                if (time == 0) {
                    let minutes = document.getElementById("minutesInput").value;
                    if (minutes < 0) {
                        document.getElementById("minus").style.display= "block";
                        return;
                    } else {
                        document.getElementById("minus").style.display= "none";
                        time = minutes * 60;
                    }
                }
                

                timerDisplay();

                timer = setInterval(function timer(){
                    
                    if (time <= 0) {
                        clearInterval(timer);
                        time = null;
                        document.getElementById("timesUp").style.display= "block";
                        navigator.vibrate(500); 
                        return;
                    }

                    time--;
                    timerDisplay();
                }, 10);
            }

            function pauseTimer() {
                clearInterval(timer);
                timer = null;
            }

            function resetTimer() {
                clearInterval(timer);
                timer = null;
                time = 0;
                document.getElementById("timesUp").style.display= "none"
                document.getElementById("minus").style.display= "none";
                timerDisplay();
            }

            timerDisplay();



        </script>

    </html>
