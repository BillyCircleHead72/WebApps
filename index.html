<!DOCTYPE html>

<html>

    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Web Calculator for Wisya</title>
        <style>
    
        body {
    margin: 0;
    background-color: #38b6ff;
    font-family: 'Segoe UI';
}

.background-container {
    position: relative;
    width: 100%;
    max-width: 500px;
    margin: auto;
}

.bg-image {
    width: 100%;
    display: block;
}

.content {
    position: absolute;
    top: 55%;       /* adjust this to fit purple box */
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    width: 100%;
}

.row {
    display: flex;
    justify-content: center;
    gap: 8px;
}

input {
    aspect-ratio: 1 / 1;
    width: 70px;
    font-size: 20px;
    font-weight: bold;
    background-color: #d5d9ff;
    border: 8px solid #401268;
    border-radius: 10px;
}
        </style>
    </head>
    <body>
        <div class="background-container">

            <img src="calculator background for Wisya.png" class="bg-image">

            <div class="content">
                <h1>Quadratic Formula Calculator (for Wisya)</h1>
                <p>Please enter the known numbers accordingly :D</p>

                <div class="row inputs">
                    <input type="number" id="a" placeholder="a"> 
                    <input type="number" id="b" placeholder="b">
                    <input type="number" id="c" placeholder="c">
            </div>

            <button onclick="calculateXAnd1X2()">Calculate</button>
            <h2 id="result"></h2>
        </div>

</div>

<p class="credits">Made by: calon suamimu</p>

    <script>

        const squareRootOfDiscriminant = (num) => Math.sqrt(num)

        function calculateXAnd1X2() {
            let a = Number(document.getElementById("a").value)
            let b = Number(document.getElementById("b").value)
            let c = Number(document.getElementById("c").value)

            let discriminant = (b ** 2 - 4 * a * c)
            

            let x1 = (-b + squareRootOfDiscriminant(discriminant)) / (2 * a)
            let x2 = (-b - squareRootOfDiscriminant(discriminant)) / (2 * a)

            if (discriminant < 0) {
                document.getElementById("result").innerText = "No Solution (Curve isn't Attached to the x-axis)"
            } else {
            document.getElementById("result").innerText = "x1 = " + x1 + "\n" + "x2 = " + x2
            }
        }
        
    </script>

</html>
